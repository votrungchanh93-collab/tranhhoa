<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranh Hoa Giấy Handmade</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: auto; }
        .product-item { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-item img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 4px; }
        @media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://maypaperflower.com/gallery/logoenggcopy_638905903701710628.png" style="max-width: 200px;">
        <h1>TRANH HOA GIẤY HANDMADE</h1>
    </div>
    
    <div class="product-grid">
        <!-- Sản phẩm 1 -->
        <div class="product-item">
            <img src="https://maypaperflower.com/gallery/D002B-Tranh-sen-hong-nen-sang-30x40cm-3_638882489517636758.jpg">
            <h3>Tranh hoa hồng ngang</h3>
            <p>500,000 đ</p>
        </div>
        <!-- Sản phẩm 2 -->
        <div class="product-item">
            <img src="https://maypaperflower.com/gallery/6_638870393541466501.jpg">
            <h3>Tranh hoa hồng ngang đỏ thắm tuyệt vời</h3>
            <p>600,000 đ</p>
        </div>
        <!-- Sản phẩm 3 -->
        <div class="product-item">
            <img src="https://maypaperflower.com/gallery/6_638870393541466501.jpg">
            <h3>Tranh hoa hồng dọc chất lượng chuẩn cao cấp</h3>
            <p>600,000 đ</p>
        </div>
        <!-- Sản phẩm 4 -->
        <div class="product-item">
            <img src="https://maypaperflower.com/gallery/6_638870393541466501.jpg">
            <h3>Tranh hoa hồng cao cấp</h3>
            <p>600,000 đ</p>
        </div>
    </div>
</body>
</html>
